apiVersion: v1
kind: Pod
metadata:
  name: sidecar-pod
  labels:
    app: sidecar-demo
spec:
  volumes:
    - name: shared-data
      emptyDir: {}
  containers:
    - name: app-container
      image: nginx:1.27
      ports:
        - containerPort: 80
      volumeMounts:
        - name: shared-data
          mountPath: /usr/share/nginx/html
    - name: sidecar-container
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          while true; do
            echo "Page generated at $(date)" > /html/index.html
            sleep 10
          done
      volumeMounts:
        - name: shared-data
          mountPath: /html
