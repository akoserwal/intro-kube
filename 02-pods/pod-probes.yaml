apiVersion: v1
kind: Pod
metadata:
  name: probed-app
spec:
  containers:
    - name: nginx
      image: nginx:1.27
      ports:
        - containerPort: 80
      startupProbe:
        httpGet:
          path: /
          port: 80
        failureThreshold: 10
        periodSeconds: 2
      livenessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 5
        failureThreshold: 3
        initialDelaySeconds: 0
      readinessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 3
        failureThreshold: 2
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"
